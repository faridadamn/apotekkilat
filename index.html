;background:#edf9f2;font-size:20px}.kpi:nth-child(2) .kicon{background:#eef5ff}.kpi:nth-child(3) .kicon{background:#fff6e4}.kpi:nth-child(4) .kicon{background:#fff0eb}.kpi:nth-child(5) .kicon{background:#f2edff}.kpi label{font-size:11px;color:var(--m);display:block}.kpi strong{display:block;font-size:19px;margin-top:3px}.up{font-size:11px;color:#0b965b;font-weight:800}.muted{color:var(--m)}.title{font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}.title a{color:#078651;font-size:12px;cursor:pointer}.chart{height:210px;background:linear-gradient(#fff,#fbfffc);border-radius:12px;overflow:hidden}.chart svg{width:100%;height:100%}.donut{width:130px;height:130px;border-radius:50%;background:conic-gradient(var(--g) 0 46%,var(--blue) 46% 73%,var(--orange) 73% 88%,var(--purple) 88%);position:relative}.donut:after{content:'';position:absolute;inset:31px;background:#fff;border-radius:50%}.notice{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #eff3f4}.notice:last-child{border:0}.notice i{width:30px;height:30px;border-radius:10px;background:#fff3e8;display:grid;place-items:center;font-style:normal}.notice b{font-size:12px;display:block}.notice small{color:var(--m)}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;color:#8492a0;padding:10px 6px;border-bottom:1px solid var(--line)}td{padding:12px 6px;border-bottom:1px solid #eff3f4;color:#46596a}tr.clickable{cursor:pointer}tr.clickable:hover{background:#f8fffb}.status{display:inline-block;padding:4px 8px;border-radius:99px;font-weight:800;font-size:10px}.ok{background:#e4f9ee;color:#078651}.warn{background:#fff2da;color:#d68400}.expired{background:#ffeded;color:#dc414a}.violet{background:#f0eaff;color:#7554d7}.tabs{display:flex;gap:9px;flex-wrap:wrap}.chip{border:0;padding:8px 11px;border-radius:9px;background:#f6f9f8;color:#627180;font-weight:800;font-size:12px;cursor:pointer}.chip.active{background:#e4f8ed;color:#078651}.tools{display:flex;gap function inventory(){return `<section class="page active"><div class="head"><div><h2>Inventori Obat</h2><p>Kelola stok, batch, dan obat mendekati expired.</p></div><button class="primary" data-action="add-product">＋ Tambah Obat</button></div>${kpis()}<div style="height:16px"></div><div class="split"><div class="card"><div class="tools"><input class="flex" id="inventorySearch" placeholder="Cari nama obat, batch, atau kategori..."/><button class="chip active" data-filter="all">Semua</button><button class="chip" data-filter="low">Stok Menipis</button><button class="chip" data-filter="expired">Expired</button><button class="outline" data-action="filter">⚗ Filter</button></div><table><thead><tr><th>Nama Obat</th><th>Kategori</th><th>Batch</th><th>Stok</th><th>Satuan</th><th>Harga Jual</th><th>Expired</th><th>Status</th></tr></thead><tbody id="inventoryBody">${inventoryRows(S.products)}</tbody></table></div><aside class="card side-list"><div class="title"><span>Peringatan Inventori</span><a data-action="notifications">Lihat semua</a></div><b>Stok Menipis</b><p>Paracetamol 500mg — 12 strip</p><p>CTM 4mg — 10 strip</p><p>Omeprazole — 6 strip</p><b>Mendekati Expired</b><p>Loratadine — 28 Mei 2025</p><p>Vitamin C — 15 Juli 2025</p><button class="outline" style="margin-top:12px" data-page="pembelian">Buat Purchase Order</button></aside></div></section>`}

function modal(title,content,onSave){document.querySelector('#modalTitle').textContent=title;document.querySelector('#modalContent').innerHTML=content;document.querySelector('#modalWrap').classList.add('show');document.querySelector('#modalSave').onclick=()=>{onSave&&onSave();document.querySelector('#modalWrap').classList.remove('show')}}
function addProduct(){modal('Tambah Obat',`<div class="form"><label>Nama Obat<input id="fName" placeholder="Contoh: Cetirizine 10mg"/></label><label>Kategori<select id="fCat"><option>Antihistamin</option><option>Analgesik</option><option>Antibiotik</option><option>Suplemen</option></select></label><label>Harga Jual<input id="fPrice" type="number" placeholder="5000"/></label><label>Stok Awal<input id="fStock" type="number" placeholder="20"/></label></div>`,()=>{let n=document.querySelector('#fName').value||'Obat Baru',p=Number(document.querySelector('#fPrice').value||5000),st=Number(document.querySelector('#fStock').value||20);S.products.push({id:Date.now(),name:n,type:'Tablet',price:p,stock:st,cat:document.querySelector('#fCat').value,batch:'NEW-'+String(Date.now()).slice(-5),expired:'01 Jan 2027',status:'Aman',tone:'ok'});render();toast('Obat baru berhasil ditambahkan')})}
function bind(){document.querySelectorAll('[data-page]').forEach(x=>x.onclick=()=>{S.page=x.dataset.page;render();window.scrollTo({top:0,behavior:'smooth'})});document.querySelectorAll('[data-add]').forEach(x=>x.onclick=()=>{let id=Number(x.dataset.add),c=S.cart.find(y=>y.id===id);c?c.q++:S.cart.push({id,q:1});render();toast('Produk ditambahkan ke keranjang')});document.querySelectorAll('[data-qty]').forEach(x=>x.onclick=()=>{let [id,d]=x.dataset.qty.split('|').map(Number),c=S.cart.find(y=>y.id===id);c.q+=d;if(c.q<1)S.cart=S.cart.filter(y=>y.id!==id);render()});document.querySelectorAll('[data-remove]').forEach(x=>x.onclick=()=>{S.cart=S.cart.filter(y=>y.id!==Number(x.dataset.remove));render()});let inv=document.querySelector('#inventorySearch');if(inv)inv.oninput=()=>{let q=inv.value.toLowerCase();document.querySelector('#inventoryBody').innerHTML=inventoryRows(S.products.filter(p=>(p.name+p.batch+p.cat).toLowerCase().includes(q)))};let ps=document.querySelector('#posSearch');if(ps)ps.oninput=()=>{let q=ps.value.toLowerCase();document.querySelector('#posGrid').innerHTML=products(S.products.filter(p=>p.name.toLowerCase().includes(q)));bind()};let cs=document.querySelector('#customerSearch');if(cs)cs.oninput=()=>{let q=cs.value.toLowerCase();document.querySelector('#customerBody').innerHTML=customerRows(S.customers.filter(x=>(x[0]+x[1]).toLowerCase().includes(q)))};document.querySelector('#globalSearch').onkeydown=e=>{if(e.key==='Enter'){let q=e.target.value.toLowerCase();let p=S.products.find(x=>x.name.toLowerCase().includes(q));if(p){S.page='inventori';render();toast('Menampilkan hasil untuk '+p.name)}else toast('Tidak ada hasil untuk “'+e.target.value+'”')}};document.querySelectorAll('[data-action]').forEach(x=>x.onclick=()=>action(x.dataset.action,x));document.querySelectorAll('[data-product]').forEach(x=>x.onclick=()=>{S.page='obat';render()})}
function action(a,e){if(a==='add-product')return addProduct();if(a==='new-transaction'){S.page='kasir';return render()}if(a==='clear-cart'){S.cart=[];render();toast('Keranjang dibersihkan');return}if(a==='checkout'){if(!S.cart.length)return toast('Keranjang masih kosong');S.cart=[];render();toast('Transaksi berhasil dibuat');return}if(a==='new-po')return modal('Buat Purchase Order',`<div class="form"><label>Supplier<select><option>Kimia Farma Trading</option><option>Dexa Medica</option></select></label><label>Catatan<input placeholder="Kebutuhan restock minggu ini"/></label></div>`,()=>toast('PO draft berhasil dibuat'));if(a==='add-customer')return modal('Tambah Pelanggan',`<div class="form"><label>Nama<input id="newCustomer" placeholder="Nama pelanggan"/></label><label>Nomor WhatsApp<input placeholder="0812..."/></label></div>`,()=>{let n=document.querySelector('#newCustomer').value||'Pelanggan Baru';S.customers.unshift([n,'0812 0000 0000','0','Aktif']);render();toast('Pelanggan berhasil ditambahkan')});if(a==='add-branch'||a==='add-user'||a==='add-batch')return modal(a==='add-branch'?'Tambah Cabang':a==='add-user'?'Tambah Pengguna':'Tambah Batch',`<div class="form"><label>Nama<input placeholder="Masukkan data baru"/></label><label>Keterangan<input placeholder="Keterangan opsional"/></label></div>`,()=>toast('Data berhasil disimpan'));if(a==='verify'){toast('Resep berhasil diverifikasi');return}if(a==='prepare'){toast('Status resep diubah menjadi: Sedang Disiapkan');return}if(a==='contact')return modal('Hubungi Kontak',`<p class="muted">Mode demo tidak mengirim WhatsApp. Nomor tujuan sudah siap dipakai untuk integrasi WhatsApp Business API.</p>`,()=>toast('Permintaan kontak dicatat'));if(a==='use-draft'){let t=document.querySelector('#draftText').textContent;document.querySelector('#chatInput').value=t;document.querySelector('#chatInput').focus();toast('Draft dimasukkan ke kolom pesan');return}if(a==='send-chat'){let inp=document.querySelector('#chatInput');if(!inp.value.trim())return toast('Tulis pesan terlebih dahulu');let d=document.createElement('div');d.className='bubble out';d.textContent=inp.value;document.querySelector('#messages').appendChild(d);inp.value='';toast('Pesan dikirim pada mode demo');return}if(a==='edit-draft')return modal('Edit Draft Balasan',`<label>Draft<textarea id="draftEdit" style="width:100%;height:130px;border:1px solid var(--line);border-radius:8px;padding:9px">${document.querySelector('#draftText').textContent}</textarea></label>`,()=>{document.querySelector('#draftText').textContent=document.querySelector('#draftEdit').value;toast('Draft diperbarui')});if(a==='escalate'){toast('Percakapan dieskalasi ke Admin');return}if(a==='refresh-ai'){document.querySelector('#draftText').textContent='Halo Kak Rina, pesanan Anda telah kami cek dan sedang dalam antrean pengiriman kurir. Kami akan mengabari segera setelah kurir mengambil pesanan.';toast('Draft AI diperbarui');return}if(a==='export'){let b=new Blob(['Periode,Penjualan,Margin\n20-26 Mei 2025,63170000,18742000'],{type:'text/csv'});let u=URL.createObjectURL(b),l=document.createElement('a');l.href=u;l.download='laporan-apotekkilat.csv';l.click();URL.revokeObjectURL(u);toast('Laporan CSV diunduh');return}if(a==='save-settings'){toast('Pengaturan tersimpan');return}if(a==='knowledge')return modal('Kelola FAQ & SOP',`<div class="form"><label>FAQ Pengiriman<textarea>Pesanan reguler diproses maksimal 1x24 jam.</textarea></label><label>Aturan Eskalasi<textarea>Refund, diskon, perubahan alamat, dan komplain berat wajib dieskalasi.</textarea></label></div>`,()=>toast('Knowledge Snapshot diperbarui ke v25'));if(a==='close-modal'){document.querySelector('#modalWrap').classList.remove('show');return}if(a==='filter'||a==='range'||a==='scanner'||a==='barcode'||a==='tour'||a==='notifications'||a==='transaction-detail'||a==='batch-detail'||a==='po-detail'||a==='customer-detail'||a==='branch-detail'||a==='user-detail'||a==='chat-detail'||a==='faq'||a==='permission-tab'||a==='supplier'||a==='edit-medicine'||a==='edit-customer'||a==='customer-select'||a==='select-chat'||a==='select-prescription')toast('Fitur UI “'+a.replaceAll('-',' ')+'” aktif pada mode demo')}
render();
</script></body></html>
