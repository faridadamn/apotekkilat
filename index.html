<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ApotekKilat — Sistem Manajemen Apotek</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">✚</div><div><h1>ApotekKilat</h1><p id="pharmacyLabel">Sistem Manajemen Apotek</p></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="tip"><div style="font-size:34px">💊</div><b>Apotek lebih cepat dan terkontrol.</b><p>Data tersimpan otomatis di perangkat ini.</p></div>
  </aside>
  <main>
    <header class="top"><button class="square" id="sidebarToggle">☰</button><input class="search" id="globalSearch" placeholder="Cari obat, transaksi, pelanggan..."/><div class="spacer"></div><div class="date" id="todayDate"></div><div class="bell">♧</div><div class="profile"><div class="avatar">NP</div><div><b>Apt. Nadia Putri</b><small id="profileBranch">Apotek Sehat</small></div></div></header>
    <div id="pages"></div>
  </main>
</div>
<div class="modal-wrap" id="modalWrap"><div class="modal"><h3 id="modalTitle">Form</h3><div id="modalContent"></div><div class="actions"><button class="outline" data-action="close-modal">Batal</button><button class="primary" id="modalSave">Simpan</button></div></div></div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script src="vendor.js"></script>
<script src="vendor-po.js"></script>
<script src="vendor-products.js"></script>
<script src="purchase-workflow.js"></script>
<script src="purchase-detail.js"></script>
<script src="purchase-detail-print.js"></script>
<script src="customer-detail.js"></script>
<script src="vendor-init.js"></script>
<script>document.querySelector('#todayDate').textContent=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});document.querySelector('#sidebarToggle').onclick=()=>document.querySelector('.app').classList.toggle('sidebar-collapsed');</script>
</body>
</html>
